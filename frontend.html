<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messenger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #1c2733;
      --bg-secondary: #17212b;
      --bg-tertiary: #242f3d;
      --bg-hover: #1f2d3a;
      --bg-active: #2b5278;
      --bg-bubble-out: #2b5278;
      --bg-bubble-in: #182533;
      --text-primary: #fff;
      --text-secondary: #7d9db5;
      --text-tertiary: #5d7485;
      --border-color: #0d1117;
      --accent-color: #5288c1;
      --accent-hover: #4a7ab0;
      --danger-color: #e94560;
      --danger-hover: #d63851;
    }

    [data-theme="light"] {
      --bg-primary: #eeeeee;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e4e6eb;
      --bg-hover: #f2f3f5;
      --bg-active: #e7f3ff;
      --bg-bubble-out: #0084ff;
      --bg-bubble-in: #e4e6eb;
      --text-primary: #050505;
      --text-secondary: #65676b;
      --text-tertiary: #8a8d91;
      --border-color: #ced0d4;
      --accent-color: #0084ff;
      --accent-hover: #0073e6;
      --danger-color: #e94560;
      --danger-hover: #d63851;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    /* ───── SIDEBAR ───── */
    .sidebar {
      width: 320px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .new-chat-btn {
      padding: 6px 12px;
      background: var(--accent-color);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: var(--accent-hover); }

    .menu-btn {
      width: 36px; height: 36px;
      border: none; background: none;
      cursor: pointer;
      display: flex; flex-direction: column;
      justify-content: center; gap: 5px;
      padding: 4px;
      border-radius: 50%;
      transition: background 0.2s;
      color: var(--text-secondary);
    }
    .menu-btn:hover { background: var(--bg-hover); }
    .menu-btn span {
      display: block; width: 20px; height: 2px;
      background: var(--text-secondary); border-radius: 2px;
    }

    .search-bar {
      padding: 8px 12px;
      background: var(--bg-secondary);
    }
    .search-bar input {
      width: 100%;
      background: var(--bg-tertiary);
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }
    .search-bar input::placeholder { color: var(--text-tertiary); }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 2px; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active { background: var(--bg-active); }

    .chat-item:hover .delete-chat-btn {
      opacity: 1;
    }

    .delete-chat-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      background: var(--danger-color);
      color: #fff;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      z-index: 10;
    }
    .delete-chat-btn:hover { background: var(--danger-hover); }

    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name {
      font-size: 15px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text-primary);
    }
    .chat-preview {
      font-size: 13px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .chat-meta {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px; flex-shrink: 0;
    }
    .chat-time { font-size: 12px; color: var(--text-tertiary); }
    .badge {
      background: var(--accent-color);
      color: #fff; font-size: 11px; font-weight: 600;
      border-radius: 10px; padding: 1px 6px;
      min-width: 18px; text-align: center;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    
    .modal-content {
      background: var(--bg-secondary);
      border-radius: 12px;
      width: 400px;
      max-height: 500px;
      display: flex;
      flex-direction: column;
    }
    
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .close-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .close-btn:hover { background: var(--bg-hover); }
    
    .modal-body {
      padding: 12px 0;
      overflow-y: auto;
      flex: 1;
    }
    
    .user-item, .settings-item {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-item:hover, .settings-item:hover { background: var(--bg-hover); }
    
    .user-item .avatar {
      width: 40px;
      height: 40px;
      font-size: 15px;
    }
    
    .user-item .user-info, .settings-item .setting-info {
      flex: 1;
    }
    
    .user-item .user-name, .settings-item .setting-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .user-item .user-status, .settings-item .setting-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .settings-item .setting-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--text-tertiary);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-switch.active {
      background: var(--accent-color);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle-switch.active::after {
      transform: translateX(20px);
    }

    .empty-list {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-tertiary);
    }

    .danger-btn {
      background: var(--danger-color);
      color: #fff;
    }
    .danger-btn:hover {
      background: var(--danger-hover);
    }

    /* ───── MAIN AREA ───── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      min-width: 0;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      gap: 12px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 15px; }

    .chat-window {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }
    .chat-header .avatar { width: 40px; height: 40px; font-size: 15px; }
    .chat-header-info { flex: 1; }
    .chat-header-info .name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .chat-header-info .status { font-size: 13px; color: var(--text-tertiary); }
    .chat-header-info .status.online { color: var(--accent-color); }

    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 36px; height: 36px;
      border: none; background: none;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      color: var(--text-secondary);
    }
    .icon-btn:hover { background: var(--bg-hover); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 2px; }

    .date-divider {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 12px;
      margin: 10px 0;
      position: relative;
    }
    .date-divider span {
      background: var(--bg-primary);
      padding: 0 10px;
    }
    .date-divider::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: var(--border-color);
      z-index: -1;
    }

    .msg-row {
      display: flex;
      margin: 1px 0;
    }
    .msg-row.out { justify-content: flex-end; }
    .msg-row.in  { justify-content: flex-start; }

    .bubble {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      position: relative;
      word-break: break-word;
    }
    .msg-row.out .bubble {
      background: var(--bg-bubble-out);
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .msg-row.in .bubble {
      background: var(--bg-bubble-in);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .msg-row.out + .msg-row.out .bubble { border-top-right-radius: 4px; }
    .msg-row.in  + .msg-row.in  .bubble { border-top-left-radius: 4px; }

    .bubble .meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 4px;
    }
    .bubble .time { font-size: 11px; color: rgba(255,255,255,0.7); }
    [data-theme="light"] .msg-row.in .bubble .time { color: var(--text-tertiary); }
    .bubble .check {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      background: var(--bg-bubble-in);
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--text-tertiary);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    .input-area {
      padding: 10px 16px;
      background: var(--bg-secondary);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-top: 1px solid var(--border-color);
    }

    .attach-btn {
      width: 40px; height: 40px;
      border: none; background: none;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary);
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .attach-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }

    .msg-input-wrap {
      flex: 1;
      background: var(--bg-tertiary);
      border-radius: 20px;
      display: flex;
      align-items: flex-end;
      padding: 6px 12px;
      gap: 8px;
    }

    #msgInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 15px;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      font-family: inherit;
    }
    #msgInput::placeholder { color: var(--text-tertiary); }

    .emoji-btn {
      background: none; border: none;
      font-size: 20px; cursor: pointer;
      padding: 2px; opacity: 0.6;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .emoji-btn:hover { opacity: 1; }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--accent-color);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:active { transform: scale(0.93); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 2px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <button class="menu-btn" id="settingsBtn" aria-label="Settings">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m-9-9h6m6 0h6"/>
      </svg>
    </button>
    <h2>Messenger</h2>
    <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search" autocomplete="off"/>
  </div>

  <div class="chat-list" id="chatList"></div>
</aside>

<main class="main" id="main">
  <div class="empty-state" id="emptyState">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Click "+ New Chat" to start messaging</p>
  </div>
</main>

<!-- New Chat Modal -->
<div class="modal" id="newChatModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Select User</h3>
      <button class="close-btn" id="closeNewChatModal">&times;</button>
    </div>
    <div class="modal-body" id="userList"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Settings</h3>
      <button class="close-btn" id="closeSettingsModal">&times;</button>
    </div>
    <div class="modal-body" id="settingsList">
      <div class="settings-item" id="themeToggle">
        <div class="setting-icon">🌓</div>
        <div class="setting-info">
          <div class="setting-name">Dark Theme</div>
          <div class="setting-desc">Switch between light and dark mode</div>
        </div>
        <div class="toggle-switch" id="themeSwitch"></div>
      </div>
      <div class="settings-item danger-btn" id="clearAllChats">
        <div class="setting-icon">🗑️</div>
        <div class="setting-info">
          <div class="setting-name">Clear All Chats</div>
          <div class="setting-desc">Delete all conversations</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="frontend.js"></script>
</body>
</html>
