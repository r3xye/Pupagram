<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messenger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c2733;
      display: flex;
      height: 100vh;
      overflow: hidden;
      color: #fff;
    }

    /* ───── SIDEBAR ───── */
    .sidebar {
      width: 320px;
      background: #17212b;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0d1117;
      flex-shrink: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #17212b;
      border-bottom: 1px solid #0d1117;
    }

    .sidebar-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .menu-btn {
      width: 36px; height: 36px;
      border: none; background: none;
      cursor: pointer;
      display: flex; flex-direction: column;
      justify-content: center; gap: 5px;
      padding: 4px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .menu-btn:hover { background: #2b3e50; }
    .menu-btn span {
      display: block; width: 20px; height: 2px;
      background: #8898a5; border-radius: 2px;
    }

    .search-bar {
      padding: 8px 12px;
      background: #17212b;
    }
    .search-bar input {
      width: 100%;
      background: #242f3d;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .search-bar input::placeholder { color: #5d7485; }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: #2b3e50; border-radius: 2px; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .chat-item:hover { background: #1f2d3a; }
    .chat-item.active { background: #2b5278; }

    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name {
      font-size: 15px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-preview {
      font-size: 13px; color: #7d9db5;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .chat-meta {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px; flex-shrink: 0;
    }
    .chat-time { font-size: 12px; color: #5d7485; }
    .badge {
      background: #5288c1;
      color: #fff; font-size: 11px; font-weight: 600;
      border-radius: 10px; padding: 1px 6px;
      min-width: 18px; text-align: center;
    }

    /* ───── MAIN AREA ───── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #1c2733;
      min-width: 0;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #5d7485;
      gap: 12px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 15px; }

    /* Chat window */
    .chat-window {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #17212b;
      border-bottom: 1px solid #0d1117;
    }
    .chat-header .avatar { width: 40px; height: 40px; font-size: 15px; }
    .chat-header-info { flex: 1; }
    .chat-header-info .name { font-size: 15px; font-weight: 600; }
    .chat-header-info .status { font-size: 13px; color: #5d7485; }
    .chat-header-info .status.online { color: #5288c1; }

    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 36px; height: 36px;
      border: none; background: none;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      color: #8898a5;
    }
    .icon-btn:hover { background: #2b3e50; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #2b3e50; border-radius: 2px; }

    .date-divider {
      text-align: center;
      color: #5d7485;
      font-size: 12px;
      margin: 10px 0;
      position: relative;
    }
    .date-divider span {
      background: #1c2733;
      padding: 0 10px;
    }
    .date-divider::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: #2b3e50;
      z-index: -1;
    }

    .msg-row {
      display: flex;
      margin: 1px 0;
    }
    .msg-row.out { justify-content: flex-end; }
    .msg-row.in  { justify-content: flex-start; }

    .bubble {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      position: relative;
      word-break: break-word;
    }
    .msg-row.out .bubble {
      background: #2b5278;
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .msg-row.in .bubble {
      background: #182533;
      border-bottom-left-radius: 4px;
      color: #fff;
    }

    .msg-row.out + .msg-row.out .bubble { border-top-right-radius: 4px; }
    .msg-row.in  + .msg-row.in  .bubble { border-top-left-radius: 4px; }

    .bubble .meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 4px;
    }
    .bubble .time { font-size: 11px; color: #7d9db5; }
    .bubble .check {
      font-size: 13px;
      color: #5288c1;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      background: #182533;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot {
      width: 6px; height: 6px;
      background: #5d7485;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* Input */
    .input-area {
      padding: 10px 16px;
      background: #17212b;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-top: 1px solid #0d1117;
    }

    .attach-btn {
      width: 40px; height: 40px;
      border: none; background: none;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #5d7485;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .attach-btn:hover { background: #2b3e50; color: #8898a5; }

    .msg-input-wrap {
      flex: 1;
      background: #242f3d;
      border-radius: 20px;
      display: flex;
      align-items: flex-end;
      padding: 6px 12px;
      gap: 8px;
    }

    #msgInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      font-family: inherit;
    }
    #msgInput::placeholder { color: #5d7485; }

    .emoji-btn {
      background: none; border: none;
      font-size: 20px; cursor: pointer;
      padding: 2px; opacity: 0.6;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .emoji-btn:hover { opacity: 1; }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: #5288c1;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #4a7ab0; }
    .send-btn:active { transform: scale(0.93); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2b3e50; border-radius: 2px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <button class="menu-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <h2>Messenger</h2>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Поиск" autocomplete="off"/>
  </div>

  <div class="chat-list" id="chatList"></div>
</aside>

<!-- MAIN -->
<main class="main" id="main">
  <div class="empty-state" id="emptyState">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#5d7485" stroke-width="1.2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Выберите чат, чтобы начать общение</p>
  </div>
</main>

<script>
// ─── WebSocket Connection ───────────────────────────────────────────────
let ws = null;
let currentUsername = null;
let reconnectInterval = null;

function connectWebSocket() {
  ws = new WebSocket('ws://localhost:8765');
  
  ws.onopen = () => {
    console.log('✅ Подключено к серверу');
    // Регистрируемся (имя пользователя можно запросить или взять из URL)
    const urlParams = new URLSearchParams(window.location.search);
    currentUsername = urlParams.get('user') || prompt('Введите ваше имя:') || 'User';
    
    ws.send(JSON.stringify({
      type: 'register',
      username: currentUsername
    }));
    
    // Запрашиваем список контактов
    ws.send(JSON.stringify({ type: 'get_contacts' }));
    ws.send(JSON.stringify({ type: 'get_online_users' }));
  };
  
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleServerMessage(data);
  };
  
  ws.onclose = () => {
    console.log('❌ Соединение закрыто');
    // Пытаемся переподключиться через 3 секунды
    setTimeout(connectWebSocket, 3000);
  };
  
  ws.onerror = (error) => {
    console.error('Ошибка WebSocket:', error);
  };
}

// ─── DATA ───────────────────────────────────────────────────────────────
const COLORS = ['#c03d2f','#e8ab03','#299f61','#168acd','#8b5cf6','#e94560','#2196f3'];
const color = name => COLORS[name.charCodeAt(0) % COLORS.length];
const initials = name => name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
const now = () => new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
const today = () => new Date().toLocaleDateString('ru', {day:'numeric',month:'long'});

let contacts = [];
let chatHistory = {};
let activeContact = null;

// ─── Handle Server Messages ─────────────────────────────────────────────
function handleServerMessage(data) {
  console.log('Получено:', data);
  
  switch(data.type) {
    case 'registered':
      console.log('Зарегистрирован как:', data.username);
      break;
      
    case 'message':
      // Входящее сообщение
      const sender = data.from;
      if (!chatHistory[sender]) chatHistory[sender] = [];
      chatHistory[sender].push({
        dir: 'in',
        text: data.text,
        time: data.timestamp
      });
      
      // Обновляем контакт
      let contact = contacts.find(c => c.name === sender);
      if (!contact) {
        contact = {
          name: sender,
          status: 'online',
          last: data.text,
          time: data.timestamp,
          unread: 0
        };
        contacts.push(contact);
      } else {
        contact.last = data.text;
        contact.time = data.timestamp;
        if (activeContact !== sender) {
          contact.unread = (contact.unread || 0) + 1;
        }
      }
      
      renderChatList();
      
      // Если чат открыт, добавляем сообщение
      if (activeContact === sender) {
        appendBubble('in', data.text, data.timestamp);
        scrollToBottom();
      }
      break;
      
    case 'message_sent':
      console.log('Сообщение доставлено');
      break;
      
    case 'user_status':
      // Обновляем статус пользователя
      const user = contacts.find(c => c.name === data.username);
      if (user) {
        user.status = data.status;
        renderChatList();
        
        // Обновляем заголовок если чат открыт
        if (activeContact === data.username) {
          updateChatHeader();
        }
      }
      break;
      
    case 'contacts':
      // Список контактов с сервера
      data.contacts.forEach(c => {
        let contact = contacts.find(ct => ct.name === c.username);
        if (!contact) {
          contacts.push({
            name: c.username,
            status: c.status,
            last: c.last_message,
            time: c.last_time,
            unread: c.unread
          });
        }
      });
      renderChatList();
      break;
      
    case 'history':
      // История сообщений
      chatHistory[data.contact] = data.messages;
      if (activeContact === data.contact) {
        renderMessages();
      }
      break;
      
    case 'online_users':
      // Обновляем статусы
      data.users.forEach(username => {
        let contact = contacts.find(c => c.name === username);
        if (contact) {
          contact.status = 'online';
        }
      });
      renderChatList();
      break;
      
    case 'typing':
      // Показываем индикатор набора
      if (activeContact === data.from) {
        showTypingIndicator();
      }
      break;
  }
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────
function renderChatList(filter='') {
  const list = document.getElementById('chatList');
  list.innerHTML = '';
  
  contacts
    .filter(c => c.name.toLowerCase().includes(filter.toLowerCase()))
    .forEach(c => {
      const el = document.createElement('div');
      el.className = 'chat-item' + (c.name === activeContact ? ' active' : '');
      el.innerHTML = `
        <div class="avatar" style="background:${color(c.name)}">${initials(c.name)}</div>
        <div class="chat-info">
          <div class="chat-name">${c.name}</div>
          <div class="chat-preview">${c.last || ''}</div>
        </div>
        <div class="chat-meta">
          <span class="chat-time">${c.time || ''}</span>
          ${c.unread ? `<span class="badge">${c.unread}</span>` : ''}
        </div>`;
      el.addEventListener('click', () => openChat(c.name));
      list.appendChild(el);
    });
}

document.getElementById('searchInput').addEventListener('input', e => {
  renderChatList(e.target.value);
});

// ─── OPEN CHAT ────────────────────────────────────────────────────────────
function openChat(username) {
  activeContact = username;
  const contact = contacts.find(c => c.name === username);
  if (contact) {
    contact.unread = 0;
  }
  renderChatList(document.getElementById('searchInput').value);

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="chat-window">
      <div class="chat-header" id="chatHeader">
        <div class="avatar" style="background:${color(username)}">${initials(username)}</div>
        <div class="chat-header-info">
          <div class="name">${username}</div>
          <div class="status ${contact?.status==='online' ? 'online' : ''}" id="statusText">${contact?.status || 'offline'}</div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" title="Поиск">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
          <button class="icon-btn" title="Меню">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
              <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="date-divider"><span>${today()}</span></div>
      </div>

      <div class="input-area">
        <button class="attach-btn" title="Прикрепить файл">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <div class="msg-input-wrap">
          <textarea id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
          <button class="emoji-btn">😊</button>
        </div>
        <button class="send-btn" id="sendBtn" title="Отправить">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path d="M22 2 11 13M22 2 15 22 11 13 2 9l20-7z"/>
          </svg>
        </button>
      </div>
    </div>`;

  // Запрашиваем историю с сервера
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type: 'get_history',
      contact: username
    }));
  }
  
  // Рендерим локальную историю если есть
  renderMessages();
  setupInput();
}

function updateChatHeader() {
  const contact = contacts.find(c => c.name === activeContact);
  if (contact) {
    const statusEl = document.getElementById('statusText');
    if (statusEl) {
      statusEl.textContent = contact.status;
      statusEl.className = 'status' + (contact.status === 'online' ? ' online' : '');
    }
  }
}

function renderMessages() {
  const msgs = chatHistory[activeContact] || [];
  const area = document.getElementById('messages');
  if (!area) return;
  
  // Очищаем кроме разделителя даты
  const divider = area.querySelector('.date-divider');
  area.innerHTML = '';
  if (divider) area.appendChild(divider);
  
  msgs.forEach(m => appendBubble(m.dir, m.text, m.time));
  scrollToBottom();
}

// ─── MESSAGES ────────────────────────────────────────────────────────────
function appendBubble(dir, text, time) {
  const area = document.getElementById('messages');
  if (!area) return;
  
  const row = document.createElement('div');
  row.className = `msg-row ${dir}`;
  row.innerHTML = `
    <div class="bubble">
      ${escapeHtml(text)}
      <div class="meta">
        <span class="time">${time}</span>
        ${dir==='out' ? '<span class="check">✓✓</span>' : ''}
      </div>
    </div>`;
  area.appendChild(row);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollToBottom() {
  const area = document.getElementById('messages');
  if (area) area.scrollTop = area.scrollHeight;
}

let typingTimeout = null;
function showTypingIndicator() {
  const area = document.getElementById('messages');
  if (!area) return;
  
  // Удаляем старый индикатор
  const old = document.getElementById('typing');
  if (old) old.remove();
  
  // Добавляем новый
  const typingRow = document.createElement('div');
  typingRow.className = 'msg-row in';
  typingRow.id = 'typing';
  typingRow.innerHTML = `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  area.appendChild(typingRow);
  scrollToBottom();
  
  // Убираем через 3 секунды
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
  }, 3000);
}

// ─── INPUT LOGIC ──────────────────────────────────────────────────────────
function setupInput() {
  const input  = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  // auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    
    // Отправляем уведомление о наборе
    if (ws && ws.readyState === WebSocket.OPEN && input.value.trim()) {
      ws.send(JSON.stringify({
        type: 'typing',
        to: activeContact
      }));
    }
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  input.focus();
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeContact) return;

  const t = now();

  // Добавляем в локальную историю
  if (!chatHistory[activeContact]) chatHistory[activeContact] = [];
  chatHistory[activeContact].push({ dir:'out', text, time: t });

  appendBubble('out', text, t);
  scrollToBottom();

  // Обновляем превью в сайдбаре
  const contact = contacts.find(c => c.name === activeContact);
  if (contact) {
    contact.last = text;
    contact.time = t;
  }
  renderChatList(document.getElementById('searchInput').value);

  // Отправляем на сервер
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type: 'send_message',
      to: activeContact,
      text: text
    }));
  }

  input.value = '';
  input.style.height = 'auto';
  input.focus();
}

// ─── INIT ─────────────────────────────────────────────────────────────────
connectWebSocket();
</script>
</body>
</html>
